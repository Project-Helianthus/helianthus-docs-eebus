name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "LICENSE"
      - "Makefile"
      - "scripts/**"
      - "tests/**"
      - ".github/**"
  push:
    branches:
      - main
      - "issue/**"
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "LICENSE"
      - "Makefile"
      - "scripts/**"
      - "tests/**"
      - ".github/**"

jobs:
  docs-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run local docs CI
        run: ./scripts/ci_local.sh
