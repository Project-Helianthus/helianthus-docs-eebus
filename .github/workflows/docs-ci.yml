name: Docs CI

on:
  pull_request:
  push:
    branches:
      - main
      - "issue/**"

jobs:
  docs-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run local docs CI
        run: ./scripts/ci_local.sh
